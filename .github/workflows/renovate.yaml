---
# NOTE: This action requires that GitHub Actions is allowed
# to create and approve pull requests.
# See: https://stackoverflow.com/a/73155199/146622
# NOTE: The PAT_CREATE_PR token must include the `workflow` scope,
# otherwise Renovate cannot update workflow files (the github-actions
# manager modifies files under .github/workflows/).
# See: https://github.com/renovatebot/github-action#special-token-requirements-when-using-the-github-actions-manager
name: "Update GitHub Actions"

on:  # yamllint disable-line rule:truthy
  schedule:
    # Run at 6:00 on Saturday
    - cron: "0 6 * * 6"
  workflow_dispatch: # Allow manual triggering

jobs:
  update-actions:
    name: "Update GitHub Actions"
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout"
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: "Renovate"
        uses: renovatebot/github-action@22e0a16091fc706b04affe6ae53d5e3358ac4023 # v46.1.19
        with:
          configurationFile: .github/renovate-config.json
          token: ${{ secrets.PAT_CREATE_PR }}
        env:
          # Tell Renovate which repository to process (the current one).
          RENOVATE_REPOSITORIES: ${{ github.repository }}
